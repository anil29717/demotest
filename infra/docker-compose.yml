services:
  postgres:
    image: postgres:16-alpine
    container_name: ar-buildwel-postgres
    environment:
      POSTGRES_USER: buildwel
      POSTGRES_PASSWORD: buildwel_dev
      POSTGRES_DB: buildwel
    # Use 5433 on host so a locally installed PostgreSQL on 5432 does not steal connections
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildwel -d buildwel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ar-buildwel-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: ar-buildwel-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

volumes:
  pgdata:
  redisdata:
  esdata:
